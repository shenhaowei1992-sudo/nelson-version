name: Update HTML

on:
  push:
    paths:
      - '*.xlsx'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm init -y
          npm install xlsx@0.18.5
          echo "--- node_modules ---"
          ls node_modules/xlsx/ 2>/dev/null | head -5
          echo "--- checking xlsx ---"
          node -e "require('xlsx'); console.log('xlsx OK')"

      - name: Regenerate HTML from xlsx
        run: |
          for f in *.xlsx; do
            if [ -f "$f" ]; then
              node gen_html.js "$f" index.html
              echo "HTML generated from $f"
              break
            fi
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4