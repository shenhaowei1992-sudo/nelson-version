name: Update HTML

on:
  push:
    paths:
      - '*.xlsx'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install xlsx
        run: npm install -g xlsx

      - name: Regenerate HTML from xlsx
        run: |
          XLSX_FILE=$(ls *.xlsx 2>/dev/null | head -1)
          if [ -n "$XLSX_FILE" ]; then
            node gen_html.js "$XLSX_FILE" version_management.html
            echo "HTML generated from $XLSX_FILE"
          else
            echo "No xlsx found, keeping existing HTML"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4